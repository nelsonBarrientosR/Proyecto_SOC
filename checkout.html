<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — ChronoLux</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --white: #ffffff;
      --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
      --slate-400: #94a3b8; --slate-500: #64748b; --slate-600: #475569;
      --slate-700: #334155; --slate-900: #0f172a;
      --red-500: #ef4444; --green-500: #22c55e; --amber-400: #fbbf24;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: var(--slate-900); background: var(--white); }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* HEADER */
    .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: transparent; transition: background 0.3s, box-shadow 0.3s; }
    .header.scrolled { background: rgba(255,255,255,0.97); backdrop-filter: blur(12px); box-shadow: 0 1px 0 var(--slate-200); }
    .header-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; height: 80px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 22px; font-weight: 300; letter-spacing: 0.05em; color: white; transition: color 0.3s; }
    .logo span { font-weight: 700; }
    .header.scrolled .logo { color: var(--black); }
    .nav { display: flex; gap: 32px; }
    .nav a { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.9); transition: opacity 0.2s; }
    .nav a:hover { opacity: 0.6; }
    .header.scrolled .nav a { color: var(--slate-700); }
    .header-dark .logo { color: var(--black) !important; }
    .header-dark .nav a { color: var(--slate-700) !important; }
    .header-dark .header-actions button { color: var(--slate-700) !important; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .header-actions button { width: 42px; height: 42px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: background 0.2s; }
    .header.scrolled .header-actions button { color: var(--slate-700); }
    .header-actions button:hover { background: rgba(255,255,255,0.1); }
    .header.scrolled .header-actions button:hover { background: var(--slate-100); }
    .cart-btn { position: relative; }
    .cart-badge { position: absolute; top: -4px; right: -4px; width: 20px; height: 20px; border-radius: 50%; background: var(--black); color: white; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
    @media (max-width: 768px) { .nav { display: none; } }

    /* CART SIDEBAR */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-sidebar { position: fixed; top: 0; right: -480px; bottom: 0; width: 100%; max-width: 440px; background: white; z-index: 201; display: flex; flex-direction: column; transition: right 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: -20px 0 60px rgba(0,0,0,0.15); }
    .cart-sidebar.open { right: 0; }
    .cart-header-bar { padding: 28px 24px; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; justify-content: space-between; }
    .cart-header-bar h2 { font-size: 20px; font-weight: 500; display: flex; align-items: center; gap: 12px; }
    .close-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--slate-100); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .close-btn:hover { background: var(--slate-200); }
    .cart-body { flex: 1; overflow-y: auto; padding: 24px; }
    .cart-item-el { display: flex; gap: 16px; padding: 16px; background: var(--slate-50); border-radius: 16px; margin-bottom: 12px; }
    .cart-item-img { width: 72px; height: 72px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: white; }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-brand { font-size: 11px; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.1em; }
    .cart-item-name { font-size: 14px; font-weight: 500; margin: 2px 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cart-item-price { font-size: 16px; font-weight: 600; }
    .cart-item-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .mini-qty { display: flex; align-items: center; gap: 10px; background: white; border-radius: 999px; padding: 4px 8px; }
    .mini-qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--slate-100); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .mini-qty-num { width: 24px; text-align: center; font-size: 14px; font-weight: 500; }
    .remove-btn { background: none; border: none; cursor: pointer; color: var(--slate-400); font-size: 16px; padding: 4px; }
    .remove-btn:hover { color: var(--red-500); }
    .cart-footer-el { padding: 24px; border-top: 1px solid var(--slate-200); }
    .cart-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    .cart-row .lbl { color: var(--slate-500); }
    .cart-row.total { font-size: 18px; font-weight: 600; padding-top: 12px; border-top: 1px solid var(--slate-200); }
    .checkout-btn-cart { width: 100%; height: 56px; border: none; border-radius: 999px; background: var(--black); color: white; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 16px; }
    .checkout-btn-cart:hover { background: #222; }
    .cart-empty-el { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; }
    .cart-empty-el .empty-icon { font-size: 64px; margin-bottom: 24px; opacity: 0.3; }
    .cart-empty-el h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .cart-empty-el p { font-size: 14px; color: var(--slate-500); margin-bottom: 24px; }
    .btn-outline-sm { padding: 10px 24px; border-radius: 999px; border: 1.5px solid var(--slate-200); background: white; cursor: pointer; font-size: 14px; }

    /* FOOTER */
    footer { background: var(--black); color: white; padding: 64px 24px 32px; }
    .footer-inner { max-width: 1280px; margin: 0 auto; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
    @media (max-width: 768px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
    .footer-logo { font-size: 22px; font-weight: 300; margin-bottom: 12px; }
    .footer-logo span { font-weight: 700; }
    .footer-desc { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.7; max-width: 320px; }
    .footer-col h4 { font-size: 13px; font-weight: 600; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.1em; }
    .footer-col ul { list-style: none; }
    .footer-col ul li { margin-bottom: 10px; }
    .footer-col ul li a { color: rgba(255,255,255,0.5); font-size: 14px; transition: color 0.2s; }
    .footer-col ul li a:hover { color: white; }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 24px; text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; }

    /* UTILS */
    .badge { padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; display: inline-block; }
    .badge-new { background: var(--black); color: white; }
    .badge-sale { background: var(--red-500); color: white; }
    .btn-primary { display: inline-flex; align-items: center; gap: 10px; background: white; color: var(--black); padding: 16px 32px; border-radius: 999px; font-size: 15px; font-weight: 500; border: none; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #f1f5f9; }

    .chk-header { background: white; border-bottom: 1px solid var(--slate-200); padding: 0 24px; height: 72px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .chk-content { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }
    .chk-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 48px; }
    @media(max-width:1024px){.chk-grid{grid-template-columns:1fr}}
    .chk-title { font-size: 32px; font-weight: 300; margin-bottom: 32px; }
    .steps-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
    .step-pill { padding: 8px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .step-pill.active,.step-pill.done { background: var(--black); color: white; }
    .step-pill.inactive { background: var(--slate-100); color: var(--slate-500); }
    .step-div { flex: 1; height: 1px; background: var(--slate-200); }
    .form-card { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media(max-width:640px){.form-row{grid-template-columns:1fr}}
    .fg { margin-bottom: 20px; }
    .fg label { display: block; font-size: 13px; font-weight: 500; color: var(--slate-700); margin-bottom: 6px; }
    .fg input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--slate-200); border-radius: 12px; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .fg input:focus { border-color: var(--slate-900); }
    .pm-option { display: flex; align-items: center; gap: 16px; padding: 16px; border-radius: 12px; border: 2px solid var(--slate-200); cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
    .pm-option.selected { border-color: var(--black); background: var(--slate-50); }
    .pm-option input[type=radio] { accent-color: black; width: 18px; height: 18px; }
    .pm-icon { font-size: 20px; }
    .pm-label { font-weight: 500; }
    .form-actions { display: flex; gap: 16px; margin-top: 32px; }
    .btn-back { padding: 16px 24px; border-radius: 999px; border: 1.5px solid var(--slate-200); background: white; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: border-color 0.2s; }
    .btn-back:hover { border-color: var(--slate-400); }
    .btn-submit { flex: 1; padding: 16px; border-radius: 999px; background: var(--black); color: white; border: none; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .btn-submit:hover { background: #222; }
    .btn-continue { width: 100%; height: 52px; border-radius: 999px; background: var(--black); color: white; border: none; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 24px; }
    .btn-continue:hover { background: #222; }
    .summary-card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); position: sticky; top: 90px; }
    .summary-card h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
    .sum-item { display: flex; gap: 16px; margin-bottom: 16px; }
    .sum-item-img { width: 60px; height: 60px; border-radius: 10px; overflow: hidden; background: var(--slate-100); flex-shrink: 0; }
    .sum-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .sum-item-info { flex: 1; min-width: 0; }
    .sum-item-brand { font-size: 11px; color: var(--slate-400); }
    .sum-item-name { font-size: 13px; font-weight: 500; }
    .sum-item-qty { font-size: 12px; color: var(--slate-500); }
    .sum-item-price { font-size: 14px; font-weight: 600; white-space: nowrap; }
    .sum-divider { border: none; border-top: 1px solid var(--slate-200); margin: 16px 0; }
    .sum-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
    .sum-row .lbl { color: var(--slate-500); }
    .sum-row.total-row { font-size: 18px; font-weight: 700; padding-top: 12px; border-top: 1px solid var(--slate-200); margin-top: 4px; }
    .security-note { display: flex; align-items: center; justify-content: center; gap: 16px; font-size: 13px; color: var(--slate-400); margin-top: 24px; }
    /* SUCCESS */
    #successPage { display: none; min-height: 100vh; background: var(--slate-50); align-items: center; justify-content: center; padding: 24px; }
    #successPage.show { display: flex; }
    .success-card { background: white; border-radius: 28px; padding: 48px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .success-icon { width: 80px; height: 80px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 24px; }
    .success-card h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .success-card p { color: var(--slate-500); margin-bottom: 24px; }
    .order-num-box { background: var(--slate-50); border-radius: 16px; padding: 20px; margin-bottom: 28px; }
    .order-num-box .lbl { font-size: 13px; color: var(--slate-500); margin-bottom: 4px; }
    .order-num-box .val { font-size: 20px; font-weight: 700; }
    .btn-home { display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px; border-radius: 999px; background: var(--black); color: white; border: none; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-home:hover { background: #222; }
  </style>
</head>
<body>
<div id="checkoutPage">
  <div class="chk-header">
    <a href="catalog.html" style="display:flex;align-items:center;gap:8px;color:var(--slate-500);font-size:14px">← Continuar comprando</a>
    <span style="font-size:14px;color:var(--slate-500)">🔒 Pago seguro</span>
  </div>
  <div class="chk-content">
    <div class="chk-grid">
      <div>
        <h1 class="chk-title">Checkout</h1>
        <div class="steps-bar">
          <div class="step-pill active" id="step1Pill">1 Envío</div>
          <div class="step-div"></div>
          <div class="step-pill inactive" id="step2Pill">2 Pago</div>
        </div>
        <!-- Step 1 -->
        <div id="step1">
          <div class="form-card">
            <h2 style="font-size:18px;font-weight:500;margin-bottom:24px">Información de envío</h2>
            <div class="form-row">
              <div class="fg" style="margin-bottom:0"><label>Nombre completo</label><input type="text" id="cName" placeholder="John Doe" /></div>
              <div class="fg" style="margin-bottom:0"><label>Email</label><input type="email" id="cEmail" placeholder="john@email.com" /></div>
            </div>
            <div class="fg"><label>Teléfono</label><input type="tel" id="cPhone" placeholder="+34 600 000 000" /></div>
            <div class="fg"><label>Dirección</label><input type="text" id="cAddress" placeholder="Calle, número, piso..." /></div>
            <div class="form-row">
              <div class="fg" style="margin-bottom:0"><label>Ciudad</label><input type="text" id="cCity" placeholder="Madrid" /></div>
              <div class="fg" style="margin-bottom:0"><label>Código postal</label><input type="text" id="cPostal" placeholder="28001" /></div>
            </div>
            <div class="fg" style="margin-top:20px"><label>País</label><input type="text" id="cCountry" value="España" /></div>
            <button class="btn-continue" onclick="goToStep2()">Continuar al pago →</button>
          </div>
        </div>
        <!-- Step 2 -->
        <div id="step2" style="display:none">
          <div class="form-card">
            <h2 style="font-size:18px;font-weight:500;margin-bottom:24px">Método de pago</h2>
            <label class="pm-option selected" id="pm-card" onclick="selectPM('card')"><input type="radio" name="pm" checked /><span class="pm-icon">💳</span><span class="pm-label">Tarjeta de crédito/débito</span></label>
            <label class="pm-option" id="pm-paypal" onclick="selectPM('paypal')"><input type="radio" name="pm" /><span class="pm-icon" style="color:#003087;font-weight:700">Pay</span><span class="pm-label">PayPal</span></label>
            <label class="pm-option" id="pm-bank" onclick="selectPM('bank')"><input type="radio" name="pm" /><span class="pm-icon">🏦</span><span class="pm-label">Transferencia bancaria</span></label>
            <div id="cardFields" style="border-top:1px solid var(--slate-200);padding-top:20px;margin-top:8px">
              <div class="fg"><label>Número de tarjeta</label><input type="text" placeholder="1234 5678 9012 3456" /></div>
              <div class="form-row">
                <div class="fg" style="margin-bottom:0"><label>Vencimiento</label><input type="text" placeholder="MM/AA" /></div>
                <div class="fg" style="margin-bottom:0"><label>CVC</label><input type="text" placeholder="123" /></div>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn-back" onclick="goToStep1()">← Volver</button>
              <button class="btn-submit" id="submitBtn" onclick="placeOrder()">Completar pedido · <span id="orderTotalTxt"></span></button>
            </div>
          </div>
        </div>
        <div class="security-note" style="margin-top:24px"><span>🔒 SSL Seguro</span><span>🔐 Datos encriptados</span></div>
      </div>
      <div><div class="summary-card" id="summaryCard"></div></div>
    </div>
  </div>
</div>
<div id="successPage">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h1>¡Gracias por tu compra!</h1>
    <p>Tu pedido ha sido procesado correctamente</p>
    <div class="order-num-box"><div class="lbl">Número de pedido</div><div class="val" id="orderNumDisplay"></div></div>
    <p style="font-size:13px;color:var(--slate-500);margin-bottom:28px">Recibirás un email de confirmación pronto</p>
    <button class="btn-home" onclick="window.location.href='index.html'">Volver a la tienda →</button>
  </div>
</div>
<script>

const products = [
  { id: 1, name: "Royal Oak Offshore", brand: "Audemars Piguet", price: 28500, originalPrice: 32000, category: "luxury", isNew: true, featured: true, stock: 3,

  { id: 3, name: "Calatrava", brand: "Patek Philippe", price: 32000, originalPrice: null, category: "classic", isNew: false, featured: true, stock: 2,

  { id: 6, name: "Portugieser Chronograph", brand: "IWC", price: 8200, originalPrice: null, category: "classic", isNew: false, featured: false, stock: 6,
    images: ["https://images.unsplash.com/photo-1612817159949-195b6eb9e31a?w=800"],

  { id: 7, name: "Big Bang Unico", brand: "Hublot", price: 22000, originalPrice: 25000, category: "luxury", isNew: true, featured: false, stock: 2,

    description: "El Big Bang Unico representa la filosofía de fusión de Hublot. Con su movimiento cronógrafo flyback UNICO de manufactura.",
    specs: { "Movimiento": "UNICO flyback", "Material": "King Gold", "Diámetro": "44mm", "Resistencia": "100m", "Correa": "Caucho", "Garantía": "5 años" } },
  { id: 8, name: "Luminor Marina", brand: "Panerai", price: 9500, originalPrice: null, category: "sport", isNew: false, featured: false, stock: 4,
    images: ["https://images.unsplash.com/photo-1585123334904-845d60e97b29?w=800"],
    description: "El Luminor Marina mantiene el ADN que hizo famoso a Panerai con la Marina Militare italiana.",
    specs: { "Movimiento": "Automático P.9010", "Material": "Acero inoxidable", "Diámetro": "44mm", "Resistencia": "300m", "Correa": "Caucho", "Garantía": "8 años" } },
];


let cart = JSON.parse(localStorage.getItem('clCart') || '[]');
function saveCart() { localStorage.setItem('clCart', JSON.stringify(cart)); }
function getCartProducts() { return cart.map(i => ({ ...i, product: products.find(p => p.id === i.id) })).filter(i => i.product); }
function getCartTotals() {
  const items = getCartProducts();
  const subtotal = items.reduce((s, i) => s + i.product.price * i.qty, 0);
  const shipping = subtotal > 500 ? 0 : 25;
  return { subtotal, shipping, total: subtotal + shipping };
}
function addToCart(id, qty = 1) {
  const ex = cart.find(i => i.id === id);
  if (ex) ex.qty += qty; else cart.push({ id, qty });
  saveCart(); updateCartBadge(); renderCartSidebar();
  showToast('Añadido al carrito ✓');
}
function updateCartQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty < 1) cart = cart.filter(i => i.id !== id);
  saveCart(); updateCartBadge(); renderCartSidebar();
}
function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  saveCart(); updateCartBadge(); renderCartSidebar();
  showToast('Eliminado del carrito');
}
function updateCartBadge() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  document.querySelectorAll('.cart-badge').forEach(b => { b.textContent = count; b.style.display = count > 0 ? 'flex' : 'none'; });
  document.querySelectorAll('.cart-count-text').forEach(el => el.textContent = count);
}
function openCart() { renderCartSidebar(); document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartSidebar').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartSidebar').classList.remove('open'); document.body.style.overflow = ''; }
function renderCartSidebar() {
  const items = getCartProducts();
  const body = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooterEl');
  if (items.length === 0) {
    body.innerHTML = '<div class="cart-empty-el"><div class="empty-icon">🛍️</div><h3>Tu carrito está vacío</h3><p>Explora nuestra colección</p><button class="btn-outline-sm" onclick="closeCart();window.location.href=\'catalog.html\'">Ver productos</button></div>';
    if (footer) footer.style.display = 'none';
    return;
  }
  body.innerHTML = items.map(item => `
    <div class="cart-item-el">
      <div class="cart-item-img"><img src="${item.product.images[0]}" alt="${item.product.name}" /></div>
      <div class="cart-item-info">
        <p class="cart-item-brand">${item.product.brand}</p>
        <p class="cart-item-name">${item.product.name}</p>
        <p class="cart-item-price">$${item.product.price.toLocaleString()}</p>
        <div class="cart-item-controls">
          <div class="mini-qty">
            <button class="mini-qty-btn" onclick="updateCartQty(${item.id},-1)">−</button>
            <span class="mini-qty-num">${item.qty}</span>
            <button class="mini-qty-btn" onclick="updateCartQty(${item.id},1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeFromCart(${item.id})">🗑</button>
        </div>
      </div>
    </div>`).join('');
  if (footer) {
    const { subtotal, shipping, total } = getCartTotals();
    document.getElementById('cartTotalsEl').innerHTML = `
      <div class="cart-row"><span class="lbl">Subtotal</span><span>$${subtotal.toLocaleString()}</span></div>
      <div class="cart-row"><span class="lbl">Envío</span><span style="${shipping===0?'color:var(--green-500)'}">${shipping===0?'Gratis':'$'+shipping}</span></div>
      ${subtotal < 500 ? `<p style="font-size:12px;color:var(--slate-400);margin-bottom:8px">Añade $${(500-subtotal).toLocaleString()} más para envío gratis</p>` : ''}
      <div class="cart-row total"><span>Total</span><span>$${total.toLocaleString()}</span></div>`;
    footer.style.display = '';
  }
}
function showToast(msg, isError = false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${isError?'#ef4444':'var(--black)'};color:white;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.2);transition:opacity 0.3s`;
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}
window.addEventListener('scroll', () => { document.getElementById('mainHeader')?.classList.toggle('scrolled', window.scrollY > 60); });

let selectedPM = 'card';
function renderSummary() {
  const items = getCartProducts();
  const { subtotal, shipping, total } = getCartTotals();
  document.getElementById('orderTotalTxt').textContent = '$' + total.toLocaleString();
  document.getElementById('summaryCard').innerHTML = `
    <h2>Resumen del pedido</h2>
    ${items.map(item => `<div class="sum-item">
      <div class="sum-item-img"><img src="${item.product.images[0]}" /></div>
      <div class="sum-item-info">
        <p class="sum-item-brand">${item.product.brand}</p>
        <p class="sum-item-name">${item.product.name}</p>
        <p class="sum-item-qty">Cant: ${item.qty}</p>
      </div>
      <p class="sum-item-price">$${(item.product.price*item.qty).toLocaleString()}</p>
    </div>`).join('')}
    <hr class="sum-divider" />
    <div class="sum-row"><span class="lbl">Subtotal</span><span>$${subtotal.toLocaleString()}</span></div>
    <div class="sum-row"><span class="lbl">Envío</span><span style="${shipping===0?'color:var(--green-500)'}">${shipping===0?'Gratis':'$'+shipping}</span></div>
    <div class="sum-row total-row"><span>Total</span><span>$${total.toLocaleString()}</span></div>`;
}
function selectPM(m) {
  selectedPM = m;
  ['card','paypal','bank'].forEach(k => { const el = document.getElementById('pm-'+k); if(el){el.classList.toggle('selected',k===m); el.querySelector('input').checked=k===m;} });
  document.getElementById('cardFields').style.display = m==='card' ? '' : 'none';
}
function goToStep2() {
  if (!document.getElementById('cName').value || !document.getElementById('cEmail').value || !document.getElementById('cAddress').value) { showToast('Por favor completa los campos requeridos', true); return; }
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='';
  document.getElementById('step1Pill').innerHTML='✓ Envío';
  document.getElementById('step2Pill').className='step-pill active';
  window.scrollTo({top:0,behavior:'smooth'});
}
function goToStep1() {
  document.getElementById('step2').style.display='none';
  document.getElementById('step1').style.display='';
  document.getElementById('step2Pill').className='step-pill inactive';
  document.getElementById('step1Pill').innerHTML='1 Envío';
  window.scrollTo({top:0,behavior:'smooth'});
}
function placeOrder() {
  const btn = document.getElementById('submitBtn');
  btn.textContent='Procesando...'; btn.disabled=true;
  setTimeout(() => {
    const num = 'ORD-'+Math.random().toString(36).substr(2,8).toUpperCase();
    cart=[]; saveCart();
    document.getElementById('orderNumDisplay').textContent = num;
    document.getElementById('checkoutPage').style.display='none';
    document.getElementById('successPage').classList.add('show');
    window.scrollTo({top:0,behavior:'instant'});
  }, 1500);
}
const cartItems = getCartProducts();
if (cartItems.length === 0) { window.location.href = 'catalog.html'; }
else { renderSummary(); }
</script>
</body></html>
